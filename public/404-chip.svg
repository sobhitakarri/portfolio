<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">
  <rect width="600" height="300" fill="#0a0a0f" rx="8"/>

  <!-- grid -->
  <defs>
    <pattern id="g" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00ff88" stroke-width="0.3" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="600" height="300" fill="url(#g)"/>

  <!-- dead chip -->
  <rect x="230" y="80" width="140" height="140" rx="6" fill="#13131f" stroke="#ff5f57" stroke-width="1.5" opacity="0.8"/>
  <rect x="248" y="98" width="104" height="104" rx="3" fill="none" stroke="#ff5f57" stroke-width="0.8" opacity="0.4"/>

  <!-- X face -->
  <line x1="268" y1="128" x2="332" y2="172" stroke="#ff5f57" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <line x1="332" y1="128" x2="268" y2="172" stroke="#ff5f57" stroke-width="3" opacity="0.7" stroke-linecap="round"/>

  <!-- dead pins -->
  <line x1="200" y1="100" x2="230" y2="100" stroke="#ff5f57" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="120" x2="230" y2="120" stroke="#ff5f57" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="140" x2="230" y2="140" stroke="#ff5f57" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="160" x2="230" y2="160" stroke="#ff5f57" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="180" x2="230" y2="180" stroke="#ff5f57" stroke-width="1.5" opacity="0.4"/>
  <line x1="200" y1="200" x2="230" y2="200" stroke="#ff5f57" stroke-width="1.5" opacity="0.4"/>

  <line x1="370" y1="100" x2="400" y2="100" stroke="#ff5f57" stroke-width="1.5" opacity="0.4"/>
  <line x1="370" y1="120" x2="400" y2="120" stroke="#ff5f57" stroke-width="1.5" opacity="0.4"/>
  <line x1="370" y1="140" x2="400" y2="140" stroke="#ff5f57" stroke-width="1.5" opacity="0.4"/>
  <line x1="370" y1="160" x2="400" y2="160" stroke="#ff5f57" stroke-width="1.5" opacity="0.4"/>
  <line x1="370" y1="180" x2="400" y2="180" stroke="#ff5f57" stroke-width="1.5" opacity="0.4"/>
  <line x1="370" y1="200" x2="400" y2="200" stroke="#ff5f57" stroke-width="1.5" opacity="0.4"/>

  <!-- 404 text -->
  <text x="300" y="262" font-family="monospace" font-size="14" fill="#ff5f57" text-anchor="middle" opacity="0.9">ERROR_404: page not found</text>
  <text x="300" y="280" font-family="monospace" font-size="11" fill="#8892a4" text-anchor="middle" opacity="0.6">// signal lost — check your route</text>
</svg>
